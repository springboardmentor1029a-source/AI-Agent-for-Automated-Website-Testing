<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Testing Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .results.active {
            display: block;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .result-item.success {
            border-left-color: #4caf50;
        }
        
        .result-item.error {
            border-left-color: #f44336;
        }
        
        .result-item strong {
            display: block;
            margin-bottom: 8px;
        }
        
        .result-item code {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            display: block;
            overflow-x: auto;
            margin-top: 10px;
        }
        
        .link-button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .link-button:hover {
            background: #5568d3;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        
        .tab-button {
            padding: 10px 15px;
            background: transparent;
            color: #666;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-weight: 500;
        }
        
        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .error-message {
            background: #ffebee;
            color: #d32f2f;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }
        
        .error-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 AI Web Testing Agent</h1>
            <p>Automatically test websites using natural language instructions</p>
        </div>
        
        <div class="card">
            <h2>Test Instructions</h2>
            
            <div class="form-group">
                <label for="url">Website URL *</label>
                <input type="url" id="url" placeholder="https://example.com" required>
            </div>
            
            <div class="form-group">
                <label for="instruction">Test Instruction *</label>
                <textarea id="instruction" placeholder="e.g., Test the login form with invalid email 'test@123' and password 'wrong', then check for error message" required></textarea>
            </div>
            
            <div class="button-group">
                <button onclick="runCompleteFlow()">🚀 Run Full Test</button>
                <button onclick="parseOnly()">📝 Parse Only</button>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
        </div>
        
        <div class="card">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Testing in progress...</p>
            </div>
            
            <div class="results" id="results">
                <h2>Results</h2>
                
                <div class="tabs">
                    <button class="tab-button active" onclick="switchTab('summary')">Summary</button>
                    <button class="tab-button" onclick="switchTab('parsed')">Parsed</button>
                    <button class="tab-button" onclick="switchTab('code')">Code</button>
                    <button class="tab-button" onclick="switchTab('execution')">Execution</button>
                </div>
                
                <div id="summary" class="tab-content active">
                    <div id="summaryContent"></div>
                </div>
                
                <div id="parsed" class="tab-content">
                    <pre id="parsedContent"></pre>
                </div>
                
                <div id="code" class="tab-content">
                    <pre id="codeContent"></pre>
                </div>
                
                <div id="execution" class="tab-content">
                    <div id="executionContent"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentResults = null;
        
        function showLoading(show = true) {
            document.getElementById("loading").classList.toggle("active", show);
        }
        
        function showError(message) {
            const errorEl = document.getElementById("errorMessage");
            errorEl.textContent = message;
            errorEl.classList.add("active");
            setTimeout(() => errorEl.classList.remove("active"), 5000);
        }
        
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll(".tab-content").forEach(tab => {
                tab.classList.remove("active");
            });
            document.querySelectorAll(".tab-button").forEach(btn => {
                btn.classList.remove("active");
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add("active");
            event.target.classList.add("active");
        }
        
        async function parseOnly() {
            const url = document.getElementById("url").value;
            const instruction = document.getElementById("instruction").value;
            
            if (!url || !instruction) {
                showError("Please fill in all fields");
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch("/api/parse-instruction", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ instruction, url })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showError(data.error || "Parsing failed");
                    return;
                }
                
                currentResults = {
                    parsed: data.parsed_instruction
                };
                
                displayResults();
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function runCompleteFlow() {
            const url = document.getElementById("url").value;
            const instruction = document.getElementById("instruction").value;
            
            if (!url || !instruction) {
                showError("Please fill in all fields");
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch("/api/test-flow", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ instruction, url })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    showError(data.error || "Test execution failed");
                    return;
                }
                
                currentResults = {
                    testName: data.test_name,
                    execution: data.execution_result,
                    htmlReport: data.html_report,
                    jsonReport: data.json_report
                };
                
                displayResults();
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }
        
        function displayResults() {
            document.getElementById("results").classList.add("active");
            
            // Summary tab
            let summaryHTML = `<p><strong>Test Status:</strong> ${currentResults.execution?.execution_status || 'N/A'}</p>`;
            if (currentResults.htmlReport) {
                summaryHTML += `<a href="${currentResults.htmlReport}" class="link-button" target="_blank">📊 View HTML Report</a>`;
            }
            document.getElementById("summaryContent").innerHTML = summaryHTML;
            
            // Parsed tab
            if (currentResults.parsed) {
                document.getElementById("parsedContent").textContent = JSON.stringify(currentResults.parsed, null, 2);
            }
            
            // Execution tab
            if (currentResults.execution) {
                let execHTML = "";
                if (currentResults.execution.steps) {
                    execHTML += "<h3>Steps:</h3>";
                    currentResults.execution.steps.forEach(step => {
                        const statusClass = step.status === "passed" ? "success" : "error";
                        execHTML += `<div class="result-item ${statusClass}">
                            <strong>${step.description || step.step}</strong>
                            <p>Status: ${step.status}</p>
                            ${step.error ? `<p>Error: ${step.error}</p>` : ""}
                        </div>`;
                    });
                }
                if (currentResults.execution.error) {
                    execHTML += `<div class="result-item error">
                        <strong>Error:</strong>
                        <p>${currentResults.execution.error}</p>
                    </div>`;
                }
                document.getElementById("executionContent").innerHTML = execHTML;
            }
        }
    </script>
</body>
</html>
